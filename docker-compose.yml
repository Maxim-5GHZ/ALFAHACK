services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-alfastart}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alfastart_secret}
      POSTGRES_DB: ${POSTGRES_DB:-alfastart}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alfastart} -d ${POSTGRES_DB:-alfastart}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    env_file: .env
    ports:
      - "8000:8000"                     # доступен с хоста
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-alfastart}:${POSTGRES_PASSWORD:-alfastart_secret}@postgres:5432/${POSTGRES_DB:-alfastart}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}   # относительный путь, чтобы запросы шли через Nginx
    ports:
      - "3000:3000"                     # доступен с хоста
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata: